<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-shell">
    <section id="loginView" class="auth-card">
      <h1>💰 Expense Tracker</h1>
      <p class="subtitle">Sign in to manage your budget and transactions.</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
      </form>
      <p class="hint">Demo account: admin@example.com / 123456</p>
      <p id="loginError" class="error-text"></p>
    </section>

    <section id="dashboardView" class="dashboard hidden">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">Welcome back</p>
          <h2 id="userName">User</h2>
        </div>
        <button id="logoutBtn" class="ghost-btn">Logout</button>
      </header>

      <div class="cards">
        <div class="card income">
          <h3>Income</h3>
          <p id="income">₹0</p>
        </div>
        <div class="card expense">
          <h3>Expense</h3>
          <p id="expense">₹0</p>
        </div>
        <div class="card balance">
          <h3>Balance</h3>
          <p id="balance">₹0</p>
        </div>
      </div>

      <div class="grid-layout">
        <div class="panel">
          <h3>Add Transaction</h3>
          <form id="transactionForm" class="form">
            <input type="text" id="title" placeholder="Title" required>
            <input type="number" id="amount" placeholder="Amount" step="0.01" required>
            <select id="type">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <input type="text" id="category" placeholder="Category" required>
            <button type="submit">Add</button>
          </form>
        </div>

        <div class="panel chart-panel">
          <h3>Spending by Category</h3>
          <canvas id="chart" width="400"></canvas>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h3>Recent Transactions</h3>
          <p id="statusMessage">Syncing with your tracker…</p>
        </div>
        <ul id="list"></ul>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
